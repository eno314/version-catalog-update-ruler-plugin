name: OSV-Scanner

on:
  schedule:
    - cron: '8 0 * * *'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-scheduled:
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5"
    with:
      scan-args: |-
        -r
        --skip-git
        ./